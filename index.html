<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fincart Workpoint — Prototype Versions</title>
<style>
:root{
  --bg-canvas:#0c0d0f; --bg-surface:#151619; --bg-soft:#1b1d21; --bg-hover:#232529; --bg-active:#2b2d31;
  --text-primary:#f0f0f1; --text-secondary:#94959a; --text-tertiary:#5c5e63;
  --border:#212226; --border-strong:#313338;
  --r-md:8px; --r-lg:11px; --r-xl:15px;
  --shadow-pop:0 16px 44px rgba(0,0,0,.55), 0 3px 12px rgba(0,0,0,.4);
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;}
body{margin:0;font-family:var(--font);background:var(--bg-canvas);color:var(--text-primary);font-size:14px;line-height:1.5;}
.wrap{max-width:760px;margin:0 auto;padding:64px 24px 80px;}
.hd{margin-bottom:36px;}
.hd h1{font-size:22px;font-weight:700;letter-spacing:-0.02em;margin:0 0 8px;}
.hd p{margin:0;color:var(--text-secondary);font-size:13.5px;max-width:520px;}
.card{border:1px solid var(--border-strong);border-radius:var(--r-lg);background:var(--bg-surface);
  padding:18px 20px;margin-bottom:12px;}
.card .top{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}
.card .v{font-size:16px;font-weight:700;}
.card .d{font-size:12px;color:var(--text-tertiary);}
.card .latest{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;
  background:var(--bg-active);color:var(--text-primary);padding:2px 8px;border-radius:999px;}
.card .summary{margin-top:9px;font-size:13px;color:var(--text-secondary);line-height:1.55;}
.card .acts{display:flex;gap:8px;margin-top:14px;}
.card .btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border-strong);
  border-radius:var(--r-md);padding:8px 14px;font-size:12.5px;font-weight:600;color:var(--text-primary);
  text-decoration:none;cursor:pointer;background:transparent;}
.card .btn:hover{background:var(--bg-hover);}
.card .btn.pri{background:var(--text-primary);color:var(--bg-canvas);border-color:var(--text-primary);}
.card .btn.pri:hover{background:#fff;}
.card .btn.disabled{opacity:.4;pointer-events:none;}
.card .btn svg{width:14px;height:14px;}

#gatewall{position:fixed;inset:0;background:var(--bg-canvas);z-index:9999;display:flex;align-items:center;justify-content:center;}
#gatebox{width:280px;text-align:center;}
#gatebox .gt{font-size:15px;font-weight:700;color:var(--text-primary);}
#gatebox .gs{font-size:12px;color:var(--text-secondary);margin-top:5px;}
#gatebox input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border-strong);
  background:var(--bg-soft);color:var(--text-primary);font-size:14px;margin-top:16px;outline:none;font-family:inherit;box-sizing:border-box;}
#gatebox input:focus{border-color:var(--text-tertiary);}
#gatebox button{margin-top:10px;width:100%;padding:10px;border-radius:8px;border:none;
  background:var(--text-primary);color:var(--bg-canvas);font-weight:700;font-size:13.5px;cursor:pointer;font-family:inherit;}
#gatebox button:hover{background:#fff;}
#gateerr{color:var(--text-secondary);font-size:11.5px;margin-top:9px;opacity:0;transition:opacity .15s;}
.gated-hidden{display:none !important;}
</style>
</head>
<body>

<div id="gatewall">
  <div id="gatebox">
    <div class="gt">Fincart Workpoint Prototype</div>
    <div class="gs">Enter the access password to continue</div>
    <input id="gatepw" type="password" placeholder="Password">
    <button onclick="checkGate()">Enter</button>
    <div id="gateerr">Incorrect password</div>
  </div>
</div>

<div id="appRoot" class="gated-hidden">
  <div class="wrap">
    <div class="hd">
      <h1>Fincart Workpoint — Prototype Versions</h1>
      <p>Low/mid-fi wireframe, greyscale, dark theme. Pick a version to open it, or jump to comments left on that version.</p>
    </div>
    <div id="versionList"></div>
  </div>
</div>

<script src="shared/site.js"></script>
<script>
siteInitGate();

function renderVersionList(){
  var el = document.getElementById('versionList');
  var ordered = VERSIONS.slice().reverse();
  el.innerHTML = ordered.map(function(v, i){
    var isLatest = i === 0;
    var commentsDisabled = !v.commentsUrl;
    return '<div class="card">'+
      '<div class="top"><span class="v">'+v.version+'</span><span class="d">'+v.date+'</span>'+
        (isLatest ? '<span class="latest">Latest</span>' : '')+'</div>'+
      '<div class="summary">'+v.summary+'</div>'+
      '<div class="acts">'+
        '<a class="btn pri" href="'+v.file+'">Open</a>'+
        '<a class="btn'+(commentsDisabled?' disabled':'')+'" href="'+(v.commentsUrl||'#')+'" '+(commentsDisabled?'':'target="_blank"')+'>'+
          (commentsDisabled ? 'No comments yet' : 'View comments')+
        '</a>'+
      '</div>'+
    '</div>';
  }).join('');
}
renderVersionList();
</script>
</body>
</html>
